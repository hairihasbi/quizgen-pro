
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GenZ QuizGen Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Amiri&family=Noto+Sans+JP&family=Noto+Serif+KR&family=Noto+Sans+TC&display=swap" rel="stylesheet">
    
    <!-- Library PDF & KaTeX -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>

    <script>
        // Fungsi Render KaTeX yang aman
        window.executeMath = function(targetElement) {
            const target = targetElement || document.body;
            if (typeof renderMathInElement === 'function') {
                renderMathInElement(target, {
                    delimiters: [
                        {left: '$$', right: '$$', display: true},
                        {left: '$', right: '$', display: false},
                        {left: '\\(', right: '\\)', display: false},
                        {left: '\\[', right: '\\]', display: true}
                    ],
                    throwOnError: false,
                    trust: true
                });
            }
        };

        // Otomatisasi Rendering menggunakan MutationObserver
        document.addEventListener('DOMContentLoaded', () => {
            const observer = new MutationObserver((mutations) => {
                let shouldRender = false;
                mutations.forEach(m => {
                    if (m.addedNodes.length > 0) shouldRender = true;
                });
                if (shouldRender) {
                    // Debounce sederhana agar tidak lag saat render masal
                    clearTimeout(window.mathTimer);
                    window.mathTimer = setTimeout(() => window.executeMath(), 100);
                }
            });
            observer.observe(document.body, { childList: true, subtree: true });
        });
    </script>

<script type="importmap">
