
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GenZ QuizGen Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Amiri&family=Noto+Sans+JP&family=Noto+Serif+KR&family=Noto+Sans+TC&display=swap" rel="stylesheet">
    
    <!-- Library PDF & KaTeX -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>

    <script>
        // Engine Auto-Renderer yang sangat agresif (Solusi untuk React re-render)
        window.executeMath = function(targetId) {
            const target = targetId ? document.getElementById(targetId) : document.body;
            if (!target) return;

            const options = {
                delimiters: [
                    {left: '$$', right: '$$', display: true},
                    {left: '$', right: '$', display: false},
                    {left: '\\(', right: '\\)', display: false},
                    {left: '\\[', right: '\\]', display: true}
                ],
                throwOnError: false,
                trust: true,
                strict: false
            };

            if (typeof renderMathInElement === 'function') {
                renderMathInElement(target, options);
            }
        };

        // Inisialisasi Observer: Pantau perubahan DOM untuk render otomatis
        document.addEventListener('DOMContentLoaded', () => {
            const observer = new MutationObserver((mutations) => {
                mutations.forEach((mutation) => {
                    if (mutation.addedNodes.length > 0) {
                        window.executeMath();
                    }
                });
            });
            observer.observe(document.body, { childList: true, subtree: true });
        });
    </script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fffaf0; margin: 0; padding: 0; }
        .orange-gradient { background: linear-gradient(135deg, #ff8c00 0%, #ff4500 100%); }
        .katex { font-size: 1.15em !important; }
        .katex-display { margin: 1em 0 !important; overflow-x: auto; overflow-y: hidden; }
        
        .print-container {
            width: 210mm;
            min-height: 297mm;
            padding: 15mm !important; 
            margin: 0 auto;
            background: white;
            box-sizing: border-box;
            position: relative;
            color: black;
        }

        @media print {
            @page { margin: 0; size: A4; }
            body { background: white !important; }
            #root > *:not(.print-modal-wrapper) { display: none !important; }
            .no-print { display: none !important; }
            .print-container { width: 100% !important; padding: 12mm !important; box-shadow: none !important; }
        }
    </style>
