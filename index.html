
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GenZ QuizGen Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Amiri&family=Noto+Sans+JP&family=Noto+Serif+KR&family=Noto+Sans+TC&display=swap" rel="stylesheet">
    
    <!-- Library untuk Save PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <script>
        window.MathJax = {
            tex: { 
                inlineMath: [['$', '$'], ['\\(', '\\)']], 
                displayMath: [['$$', '$$'], ['\\[', '\\]']], 
                processEscapes: true 
            },
            svg: { 
                fontCache: 'none',
                displayAlign: 'left'
            },
            options: { 
                enableMenu: false,
                ignoreHtmlClass: 'tex2jax_ignore' 
            },
            startup: { 
                typeset: true,
                ready: () => {
                    MathJax.startup.defaultReady();
                    console.log("MathJax is ready");
                }
            }
        };
    </script>
    <script type="text/javascript" id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fffaf0; margin: 0; padding: 0; }
        .orange-gradient { background: linear-gradient(135deg, #ff8c00 0%, #ff4500 100%); }
        
        mjx-container { 
            display: inline-block !important; 
            vertical-align: middle !important; 
            margin: 0 0.1em !important; 
            line-height: 0 !important;
            min-width: 0.5em;
        }

        .print-container {
            width: 210mm;
            min-height: 297mm;
            padding: 15mm !important; 
            margin: 0 auto;
            background: white;
            box-sizing: border-box !important;
            position: relative;
            color: black;
            box-shadow: 0 0 50px rgba(0,0,0,0.1);
        }

        .print-container.landscape-mode {
            width: 297mm !important;
            min-height: 210mm !important;
        }

        @media print {
            @page { margin: 0; }
            body { background: white !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            #root > *:not(.print-modal-wrapper) { display: none !important; }
            .no-print { display: none !important; }
            
            .print-container {
                width: 100% !important;
                padding: 12mm !important;
                margin: 0 !important;
                border: none !important;
                box-shadow: none !important;
                display: block !important;
            }

            .pdf-block {
                break-inside: avoid !important;
                page-break-inside: avoid !important;
                margin-bottom: 1rem !important;
            }

            img {
                max-width: 100% !important;
                height: auto !important;
                display: block !important;
                margin: 10px 0 !important;
                page-break-inside: avoid !important;
            }

            table { page-break-inside: auto; width: 100% !important; border-collapse: collapse !important; }
            tr { page-break-inside: avoid !important; page-break-after: auto !important; }
            td, th { border: 1px solid black !important; }
        }

        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #fff7ed; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #fed7aa; border-radius: 20px; }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "@google/genai": "https://esm.sh/@google/genai@^1.40.0",
    "@libsql/client": "https://esm.sh/@libsql/client@^0.17.0",
    "crypto": "https://esm.sh/crypto@^1.0.1",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.4",
    "puppeteer-core": "https://esm.sh/puppeteer-core@^24.37.2",
    "@sparticuz/chromium": "https://esm.sh/@sparticuz/chromium@^143.0.4"
  }
}
</script>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
</body>
</html>
